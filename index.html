<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลงทะเบียน WTC</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>กำลังโหลด...</span>
</div>

<!-- Form -->
<div id="formScreen" style="display:none;">
  <div class="header">
    <h1>ลงทะเบียน WTC</h1>
    <p>กรุณากรอกข้อมูลให้ครบถ้วน</p>
  </div>

  <div class="card">
    <div class="type-label">คุณคือ <span class="required">*</span></div>
    <div class="type-row">
      <div class="type-chip active" data-type="employee" onclick="selectType('employee')">พนักงาน</div>
      <div class="type-chip" data-type="customer" onclick="selectType('customer')">ลูกค้า</div>
      <div class="type-chip" data-type="supplier" onclick="selectType('supplier')">ซัพพลายเออร์</div>
    </div>

    <!-- พนักงาน -->
    <div id="fields-employee">
      <div class="field">
        <label>ชื่อ-นามสกุล <span class="required">*</span></label>
        <input type="text" id="emp-name" placeholder="ชื่อจริง นามสกุล" autocomplete="off">
      </div>
      <div class="field">
        <label>แผนก / ตำแหน่ง <span class="required">*</span></label>
        <select id="emp-dept">
          <option value="">เลือกแผนก</option>
          <option value="รปภ.">รปภ.</option>
          <option value="โบว์เค้าท์">โบว์เค้าท์ (หน้างาน)</option>
          <option value="office-production">ออฟฟิส — ผลิต</option>
          <option value="office-sales">ออฟฟิส — ขาย</option>
          <option value="office-accounting">ออฟฟิส — บัญชี</option>
          <option value="office-hr">ออฟฟิส — HR</option>
          <option value="management">ผู้บริหาร</option>
        </select>
      </div>
      <div class="field">
        <label>เบอร์โทรติดต่อ</label>
        <input type="tel" id="emp-phone" placeholder="08x-xxx-xxxx" autocomplete="off">
      </div>
    </div>

    <!-- ลูกค้า -->
    <div id="fields-customer" style="display:none;">
      <div class="field">
        <label>ชื่อ-นามสกุล <span class="required">*</span></label>
        <input type="text" id="cus-name" placeholder="ชื่อจริง นามสกุล" autocomplete="off">
      </div>
      <div class="field">
        <label>บริษัท / องค์กร <span class="required">*</span></label>
        <input type="text" id="cus-company" placeholder="ชื่อบริษัท" autocomplete="off">
      </div>
      <div class="field">
        <label>เบอร์โทรติดต่อ <span class="required">*</span></label>
        <input type="tel" id="cus-phone" placeholder="08x-xxx-xxxx" autocomplete="off">
      </div>
      <div class="field">
        <label>โปรเจกต์ที่เกี่ยวข้อง</label>
        <input type="text" id="cus-project" placeholder="ชื่อโครงการ หรือที่ตั้ง" autocomplete="off">
      </div>
    </div>

    <!-- ซัพพลายเออร์ -->
    <div id="fields-supplier" style="display:none;">
      <div class="field">
        <label>ชื่อ-นามสกุล <span class="required">*</span></label>
        <input type="text" id="sup-name" placeholder="ชื่อจริง นามสกุล" autocomplete="off">
      </div>
      <div class="field">
        <label>บริษัท <span class="required">*</span></label>
        <input type="text" id="sup-company" placeholder="ชื่อบริษัท" autocomplete="off">
      </div>
      <div class="field">
        <label>ประเภทสินค้า / บริการ <span class="required">*</span></label>
        <select id="sup-type">
          <option value="">เลือกประเภท</option>
          <option value="วัตถุดิบ">วัตถุดิบ / วัสดุ</option>
          <option value="เครื่องจักร">เครื่องจักร / อะไหล่</option>
          <option value="ขนส่ง">ขนส่ง / โลจิสติกส์</option>
          <option value="บริการ">บริการทั่วไป</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>
      <div class="field">
        <label>เบอร์โทรติดต่อ <span class="required">*</span></label>
        <input type="tel" id="sup-phone" placeholder="08x-xxx-xxxx" autocomplete="off">
      </div>
    </div>

    <hr class="divider">
    <p class="userid-note">LINE ID ของคุณจะถูกบันทึกอัตโนมัติ<br>เพื่อกำหนดเมนูที่เหมาะสมกับคุณ</p>
    <div class="error-msg" id="errorMsg">กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน</div>
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">ยืนยันลงทะเบียน</button>
  </div>
</div>

<!-- Success -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✓</div>
  <h2>ลงทะเบียนสำเร็จ!</h2>
  <p id="successMsg">ระบบบันทึกข้อมูลแล้ว<br>เมนูจะเปลี่ยนโดยอัตโนมัติภายในไม่กี่วินาที</p>
</div>

<script src="js/app.js"></script>
</body>
</html>
